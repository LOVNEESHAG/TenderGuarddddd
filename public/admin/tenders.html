<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Tenders - TenderGuard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container" style="max-width: 100%; padding: 0 2rem;">
            <a href="/" class="logo">
                <i class="fa-solid fa-shield-halved"></i> TenderGuard <span
                    style="font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; margin-left: 0.25rem;">Admin</span>
            </a>
            <div class="nav-links">
                <a href="/admin/dashboard.html">Back to Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-title">Menu</div>
            <a href="/admin/dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="/admin/tenders.html" class="active"><i class="fa-solid fa-file-contract"></i> Manage Tenders</a>
            <a href="/admin/risk-analysis.html"><i class="fa-solid fa-triangle-exclamation"></i> Risk Analysis</a>
            <div class="sidebar-title mt-4">Public</div>
            <a href="/public/complaints.html"><i class="fa-solid fa-bullhorn"></i> Public Complaints</a>
            <a href="/public/portal.html" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live Portal</a>
        </aside>

        <main class="main-content">
            <div class="flex justify-between items-center mb-6">
                <h2>Manage Tenders</h2>
                <button id="add-tender-btn" class="btn btn-primary"><i class="fa-solid fa-plus mr-2"></i> Create New
                    Tender</button>
            </div>

            <!-- Create Tender Form (Hidden initially) -->
            <div id="create-tender-form" class="card mb-8 hidden">
                <h3 class="mb-4">Create New Tender</h3>
                <form id="new-tender">
                    <div class="grid md:grid-cols-2 gap-4">
                        <div class="form-group">
                            <label class="form-label">Tender Title</label>
                            <input type="text" id="title" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Budget (₹)</label>
                            <input type="number" id="budget" class="form-control" required>
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label class="form-label flex justify-between items-center">
                                Location 
                                <button type="button" id="get-location-btn" class="btn btn-outline" style="padding: 0.25rem 0.5rem; font-size: 0.8rem;">
                                    <i class="fa-solid fa-location-crosshairs mr-1"></i> Use Current Location
                                </button>
                            </label>
                            <div class="flex gap-2">
                                <input type="text" id="location" class="form-control" placeholder="Search or click on map..." required>
                                <button type="button" id="search-location-btn" class="btn btn-primary"><i class="fa-solid fa-magnifying-glass"></i></button>
                            </div>
                            <div id="tender-map" style="height: 300px; width: 100%; border-radius: 8px; margin-top: 10px; z-index: 1;"></div>
                            <input type="hidden" id="lat">
                            <input type="hidden" id="lng">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Deadline</label>
                            <input type="date" id="deadline" class="form-control" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Description</label>
                        <textarea id="description" class="form-control" rows="3" required></textarea>
                    </div>
                    <div class="flex gap-4 mt-4">
                        <button type="submit" class="btn btn-primary">Publish Tender</button>
                        <button type="button" id="cancel-create" class="btn btn-outline">Cancel</button>
                    </div>
                </form>
            </div>

            <div class="table-container">
                <table id="tenders-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Location</th>
                            <th>Budget</th>
                            <th>Deadline</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tenders-list">
                        <!-- Populated via JS -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="/js/api.js"></script>
    <script>
        checkAuth('admin');

        let map, marker;
        
        function initMap() {
            if (map) return; // Already initialized
            
            // Default to central India
            map = L.map('tender-map').setView([20.5937, 78.9629], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
            }).addTo(map);

            marker = L.marker([20.5937, 78.9629], {draggable: true}).addTo(map);
            
            // Handle marker drag
            marker.on('dragend', function(event) {
                var position = marker.getLatLng();
                updateLocationInfo(position.lat, position.lng);
            });

            // Handle map click
            map.on('click', function(e) {
                marker.setLatLng(e.latlng);
                updateLocationInfo(e.latlng.lat, e.latlng.lng);
            });
            
            // Fix Leaflet map rendering issues when un-hidden
            setTimeout(() => { map.invalidateSize(); }, 200);
        }

        async function updateLocationInfo(lat, lng) {
            document.getElementById('lat').value = lat;
            document.getElementById('lng').value = lng;
            
            // Reverse Geocoding via Nominatim
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`);
                const data = await response.json();
                if (data && data.display_name) {
                    document.getElementById('location').value = data.display_name;
                }
            } catch (error) {
                console.error("Error reverse geocoding:", error);
            }
        }
        
        // Search by text
        document.getElementById('search-location-btn').addEventListener('click', async () => {
            const query = document.getElementById('location').value;
            if (!query) return;
            
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}`);
                const data = await response.json();
                if (data && data.length > 0) {
                    const lat = parseFloat(data[0].lat);
                    const lon = parseFloat(data[0].lon);
                    
                    document.getElementById('lat').value = lat;
                    document.getElementById('lng').value = lon;
                    document.getElementById('location').value = data[0].display_name;
                    
                    if (map) {
                        map.setView([lat, lon], 13);
                        marker.setLatLng([lat, lon]);
                    }
                } else {
                    alert('Location not found. Please try a different search term or click on the map.');
                }
            } catch (error) {
                console.error("Error forward geocoding:", error);
            }
        });

        document.getElementById('get-location-btn').addEventListener('click', () => {
             if (navigator.geolocation) {
                // visual feedback
                const btn = document.getElementById('get-location-btn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Locating...';
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const { latitude, longitude } = position.coords;
                        
                        // Update Map
                        if (map) {
                            map.setView([latitude, longitude], 15);
                            marker.setLatLng([latitude, longitude]);
                        }
                        
                        updateLocationInfo(latitude, longitude);
                        btn.innerHTML = originalText;
                    },
                    (error) => {
                        alert("Error getting location. Please check your browser permissions.");
                        btn.innerHTML = originalText;
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser.");
            }
        });

        document.getElementById('add-tender-btn').addEventListener('click', () => {
            document.getElementById('create-tender-form').classList.remove('hidden');
            initMap();
        });
        document.getElementById('cancel-create').addEventListener('click', () => {
            document.getElementById('create-tender-form').classList.add('hidden');
        });

        // Submit new tender
        document.getElementById('new-tender').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const lat = document.getElementById('lat').value;
            const lng = document.getElementById('lng').value;
            
            if (!lat || !lng) {
                alert("Please select a specific location on the map or use your current location.");
                return;
            }

            const data = {
                title: document.getElementById('title').value,
                budget: document.getElementById('budget').value,
                location: { 
                    name: document.getElementById('location').value,
                    lat: parseFloat(lat),
                    lng: parseFloat(lng)
                },
                deadline: document.getElementById('deadline').value,
                description: document.getElementById('description').value
            };

            try {
                const res = await api.createTender(data);
                if (res.success) {
                    alert('Tender created successfully');
                    document.getElementById('create-tender-form').classList.add('hidden');
                    document.getElementById('new-tender').reset();
                    loadTenders();
                } else {
                    alert(res.error || 'Failed to create tender');
                }
            } catch (err) { alert('Error creating tender'); }
        });

        async function loadTenders() {
            try {
                const res = await api.getTenders();
                if (res.success) {
                    const tbody = document.getElementById('tenders-list');
                    tbody.innerHTML = '';
                    res.data.forEach(tender => {
                        const deadline = new Date(tender.deadline).toLocaleDateString();
                        const statusBadge = tender.status === 'open'
                            ? '<span class="badge badge-low">Open</span>'
                            : (tender.status === 'closed' ? '<span class="badge badge-medium">Closed</span>' : '<span class="badge badge-high">Awarded</span>');

                        tbody.innerHTML += `
                            <tr>
                                <td>${tender.title}</td>
                                <td>${tender.location.name}</td>
                                <td>₹${tender.budget.toLocaleString()}</td>
                                <td>${deadline}</td>
                                <td>${statusBadge}</td>
                                <td>
                                    <a href="/admin/risk-analysis.html?tenderId=${tender._id}" class="btn btn-outline" style="padding: 0.25rem 0.75rem; font-size: 0.875rem;">View Bids</a>
                                </td>
                            </tr>
                        `;
                    });
                }
            } catch (err) { console.error(err); }
        }

        document.addEventListener('DOMContentLoaded', loadTenders);
    </script>
</body>

</html>
