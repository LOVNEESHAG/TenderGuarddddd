<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Citizen Reports Map - TenderGuard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">

    <!-- MapLibre GL JS -->
    <script src="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.js"></script>
    <link href="https://unpkg.com/maplibre-gl@3.3.1/dist/maplibre-gl.css" rel="stylesheet" />

    <style>
        #map {
            width: 100%;
            height: 600px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .map-popup .maplibregl-popup-content {
            background-color: var(--primary-bg);
            color: var(--text-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 15px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            font-family: 'Inter', sans-serif;
            max-width: 300px;
        }

        .map-popup .maplibregl-popup-close-button {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .popup-img {
            max-width: 100%;
            border-radius: var(--radius-sm);
            margin-top: 10px;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container" style="max-width: 100%; padding: 0 2rem;">
            <a href="/" class="logo">
                <i class="fa-solid fa-shield-halved"></i> TenderGuard <span
                    style="font-size: 0.875rem; color: var(--text-secondary); font-weight: 500; margin-left: 0.25rem;">Admin</span>
            </a>
            <div class="nav-links">
                <a href="/admin/dashboard.html" class="btn btn-outline" style="padding: 0.4rem 1rem;">Back to
                    Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-title">Menu</div>
            <a href="/admin/dashboard.html"><i class="fa-solid fa-gauge"></i> Dashboard</a>
            <a href="/admin/tenders.html"><i class="fa-solid fa-file-contract"></i> Manage Tenders</a>
            <a href="/admin/risk-analysis.html"><i class="fa-solid fa-triangle-exclamation"></i> Risk Analysis</a>
            <a href="/admin/network-risk.html"><i class="fa-solid fa-project-diagram"></i> Network Risk Analysis</a>
            <a href="/admin/citizen-reports.html" class="active"><i class="fa-solid fa-map-location-dot"></i> Citizen
                Reports</a>
            <div class="sidebar-title mt-4">Public</div>
            <a href="/public/complaints.html"><i class="fa-solid fa-bullhorn"></i> Public Complaints</a>
            <a href="/public/portal.html" target="_blank"><i class="fa-solid fa-arrow-up-right-from-square"></i> Live
                Portal</a>
        </aside>

        <main class="main-content">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2>Citizen Complaint Map</h2>
                    <p class="text-muted">Geo-based reports of infrastructure issues from verified citizens.</p>
                </div>
            </div>

            <!-- Map Container -->
            <div class="card p-0 overflow-hidden mb-8 shadow-md">
                <div id="map"></div>
            </div>

            <div class="card">
                <h3 class="mb-4">Recent Reports List</h3>
                <div id="reports-list" class="flex-col gap-4">
                    <!-- Populated via JS -->
                </div>
            </div>

        </main>
    </div>

    <script src="/js/api.js"></script>
    <script>
        const user = checkAuth('admin');

        const map = new maplibregl.Map({
            container: 'map',
            style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
            center: [77.2090, 28.6139], // Default to New Delhi
            zoom: 10
        });

        // Add zoom and rotation controls to the map.
        map.addControl(new maplibregl.NavigationControl());

        async function init() {
            try {
                const res = await fetch('/api/complaints/map');
                const response = await res.json();

                if (response.success) {
                    const complaints = response.data;
                    const listContainer = document.getElementById('reports-list');

                    if (complaints.length === 0) {
                        listContainer.innerHTML = '<p class="text-muted text-center py-4">No citizen reports recorded yet.</p>';
                        return;
                    }

                    // Fit bounds to include all markers
                    const bounds = new maplibregl.LngLatBounds();
                    let validCoords = false;

                    complaints.forEach(complaint => {
                        let lng = 0;
                        let lat = 0;

                        // Try tender location first, or complaint precise location if added
                        if (complaint.location && complaint.location.lat && complaint.location.lng) {
                            lng = complaint.location.lng;
                            lat = complaint.location.lat;
                        } else if (complaint.tender && complaint.tender.location && complaint.tender.location.lat) {
                            lng = complaint.tender.location.lng;
                            lat = complaint.tender.location.lat;
                        }

                        if (lat !== 0 && lng !== 0) {
                            validCoords = true;
                            bounds.extend([lng, lat]);

                            // Create Popup
                            const imgHtml = complaint.photo ? `<img src="/${complaint.photo.replace(/\\/g, '/')}" class="popup-img" alt="Issue Photo"/>` : '';
                            const date = new Date(complaint.createdAt).toLocaleDateString();

                            const html = `
                                <div>
                                    <div class="font-semibold text-base mb-1">${complaint.category ? complaint.category.toUpperCase() : 'ISSUE'}</div>
                                    <div class="text-xs text-muted mb-2">${complaint.tender ? complaint.tender.title : 'Unknown Project'}</div>
                                    <p class="text-sm mb-2">${complaint.description}</p>
                                    <div class="text-xs text-muted mb-2">Reported: ${date}</div>
                                    <span class="badge ${complaint.status === 'Resolved' ? 'badge-low' : 'badge-high'}">${complaint.status}</span>
                                    ${imgHtml}
                                </div>
                            `;

                            const popup = new maplibregl.Popup({ className: 'map-popup' })
                                .setHTML(html);

                            // Create Marker
                            new maplibregl.Marker({ color: '#ef4444' })
                                .setLngLat([lng, lat])
                                .setPopup(popup)
                                .addTo(map);
                        }

                        // Add to list UI
                        listContainer.innerHTML += `
                            <div class="p-4" style="background: var(--surface-light); border: 1px solid var(--border); border-radius: var(--radius-md);">
                                <div class="flex justify-between items-start mb-2">
                                    <div>
                                        <div style="font-weight: 500;">${complaint.tender ? complaint.tender.title : 'Unknown Project'} - <span class="capitalize">${complaint.category || 'General'}</span></div>
                                        <div class="text-xs text-muted mt-1">Reported on ${new Date(complaint.createdAt).toLocaleString()}</div>
                                    </div>
                                    <span class="badge ${complaint.status === 'Resolved' ? 'badge-low' : 'badge-high'}">${complaint.status}</span>
                                </div>
                                <p class="text-sm text-body">${complaint.description}</p>
                            </div>
                        `;
                    });

                    if (validCoords) {
                        map.fitBounds(bounds, { padding: 50 });
                    }
                }
            } catch (err) {
                console.error('Error fetching map complaints:', err);
                document.getElementById('reports-list').innerHTML = '<div class="text-center p-8 text-red-500">Failed to load reports.</div>';
            }
        }

        map.on('load', init);

    </script>
</body>

</html>
